version: "3.9"

services:

  api:
    build: .
    container_name: nutrigenix-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant
    container_name: nutrigenix-vector-db
    ports:
      - "6333:6333"

  streamlit:
    build: .
    container_name: nutrigenix-ui
    command: streamlit run app.py --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - api