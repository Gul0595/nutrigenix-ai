version: "3.9"

services:

  # ── Neo4j Knowledge Graph ─────────────────────────────────────────
  neo4j:
    image: neo4j:5.16-community
    container_name: nutrigenix_neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/nutrigenix123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./docker/neo4j/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── MLflow Tracking Server ────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: nutrigenix_mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL (Audit logs + Airflow backend) ─────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nutrigenix_postgres
    environment:
      POSTGRES_USER: nutrigenix
      POSTGRES_PASSWORD: nutrigenix123
      POSTGRES_DB: nutrigenix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrigenix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NutriGenix API ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: nutrigenix_api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=nutrigenix123
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DATABASE_URL=postgresql://nutrigenix:nutrigenix123@postgres:5432/nutrigenix_db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./vector_store:/app/vector_store
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  neo4j_data:
  neo4j_logs:
  mlflow_data:
  postgres_data:
